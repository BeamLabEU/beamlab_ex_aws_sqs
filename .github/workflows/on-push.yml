name: on-push
on: [push, pull_request]
env:
  MIX_ENV: test
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - otp: "27.2"
            elixir: "1.18.4"
          - otp: "28.0"
            elixir: "1.19.5"
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
          version-type: strict
      - name: Run elasticmq
        run: |
          docker run -d --name elasticmq -p 9324:9324 softwaremill/elasticmq
          echo "Waiting for ElasticMQ on port 9324..."
          for i in $(seq 1 30); do
            if curl -s --connect-timeout 1 http://localhost:9324 >/dev/null 2>&1; then
              echo "ElasticMQ responded"
              break
            fi
            sleep 1
          done
          docker logs --tail 10 elasticmq || true
      - uses: actions/cache@v4
        with:
          path: deps
          key: mix-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
        if: matrix.elixir == '1.19.5'
      - run: mix credo --strict
        if: matrix.elixir == '1.19.5'
      - run: mix dialyzer
        if: matrix.elixir == '1.19.5'
      - run: mix test --include external:true
